<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.40), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }
        .btn-primary {
            background: linear-gradient(135deg, theme('colors.primary-container'), theme('colors.secondary-container'));
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.2);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.4), 0 0 20px rgba(91, 92, 235, 0.4);
            transform: translateY(-1px);
        }
        .input-glass {
            background: #12182B;
            border: 1px solid theme('colors.outline-variant');
            transition: all 0.2s ease;
        }
        .input-glass:focus {
            outline: none;
            border-color: theme('colors.primary-container');
            box-shadow: 0 0 0 2px rgba(91, 92, 235, 0.2);
            transform: translateY(-2px);
        }
        body {
            background-image: radial-gradient(circle at 50% 0%, #1a1f30 0%, #0e1323 70%);
            background-attachment: fixed;
        }
    </style>
</head>
<body class="bg-background text-text-primary min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop antialiased">
<!-- Ambient background glow elements -->
<div class="fixed top-0 left-1/4 w-96 h-96 bg-primary-container/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="fixed bottom-0 right-1/4 w-[500px] h-[500px] bg-secondary-container/5 rounded-full blur-[150px] pointer-events-none"></div>
<main class="w-full max-w-md relative z-10">
<!-- Logo -->
<div class="flex justify-center mb-stack-lg">
<h1 class="font-display-lg text-display-lg text-text-primary tracking-tighter">
                Qchart
            </h1>
</div>
<!-- Login Card -->
<div class="glass-card rounded-xl p-stack-lg w-full">
<h2 class="font-headline-md text-headline-md text-text-primary mb-stack-xs text-center">
                Welcome back
            </h2>
<p class="font-body-md text-body-md text-text-muted text-center mb-stack-lg">
                Enter your details to access your workspace
            </p>
<form action="#" class="flex flex-col gap-stack-md" method="POST">
<!-- Email Input -->
<div class="flex flex-col gap-stack-sm">
<label class="font-label-sm text-label-sm text-text-secondary uppercase tracking-widest" for="email">
                        Email
                    </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-text-muted" data-icon="mail">mail</span>
<input class="input-glass w-full rounded-lg py-3 pl-10 pr-4 font-body-md text-body-md text-text-primary placeholder-text-muted/50" id="email" name="email" placeholder="name@agency.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-stack-sm">
<div class="flex justify-between items-center">
<label class="font-label-sm text-label-sm text-text-secondary uppercase tracking-widest" for="password">
                            Password
                        </label>
<a class="font-caption text-caption text-primary hover:text-primary-fixed transition-colors" href="#">
                            Forgot Password?
                        </a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-text-muted" data-icon="lock">lock</span>
<input class="input-glass w-full rounded-lg py-3 pl-10 pr-4 font-body-md text-body-md text-text-primary placeholder-text-muted/50" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Submit Button -->
<button class="btn-primary w-full rounded-lg py-3 font-body-md text-body-md font-semibold text-white mt-stack-sm flex items-center justify-center gap-2" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<div class="mt-stack-lg pt-stack-md border-t border-outline-variant/30 text-center">
<p class="font-body-md text-body-md text-text-muted">
                    Don't have an account? 
                    <a class="text-primary hover:text-primary-fixed font-semibold transition-colors ml-1" href="#">
                        Sign Up
                    </a>
</p>
</div>
</div>
</main>
<script>
        // Subtle 3D tilt effect for the login card
        document.addEventListener('DOMContentLoaded', () => {
            const card = document.querySelector('.glass-card');
            
            document.addEventListener('mousemove', (e) => {
                if(window.innerWidth < 768) return; // Disable on mobile
                
                const xAxis = (window.innerWidth / 2 - e.pageX) / 50;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 50;
                
                card.style.transform = `perspective(1000px) rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            });

            // Reset on mouse leave
            document.addEventListener('mouseleave', () => {
                card.style.transform = `perspective(1000px) rotateY(0deg) rotateX(0deg)`;
                card.style.transition = 'transform 0.5s ease';
            });
            
            document.addEventListener('mouseenter', () => {
                card.style.transition = 'none';
            });
        });
    </script>
</body></html>
